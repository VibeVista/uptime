status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  # cname: status.example.com
  baseUrl: /uptime
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: VibeVista Status
  introTitle: "**VibeVista Status** — real-time uptime monitoring for our services."
  introMessage: This is the status page for VibeVista's services, powered by [Upptime](https://upptime.js.org). It uses **real-time** data from our [GitHub repository](https://github.com/VibeVista/uptime). No server required — just GitHub Actions, Issues, and Pages.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Upptime also supports notifications, assigning issues, and more
